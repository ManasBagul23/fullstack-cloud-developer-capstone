version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: dealership-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: dealership
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - dealership-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Express Microservice
  microservice:
    build:
      context: ./server/microservices
      dockerfile: Dockerfile
    container_name: dealership-microservice
    restart: unless-stopped
    environment:
      PORT: 3030
      MONGODB_URI: mongodb://mongodb:27017/dealership
    ports:
      - "3030:3030"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dealership-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Django Backend
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dealership-django
    restart: unless-stopped
    environment:
      DEBUG: "False"
      DEALER_MICROSERVICE_URL: http://microservice:3030
      SENTIMENT_ANALYZER_URL: http://sentiment:5050
    ports:
      - "8000:8000"
    depends_on:
      - microservice
    networks:
      - dealership-network
    volumes:
      - static_volume:/app/staticfiles

  # React Frontend (Development)
  frontend:
    build:
      context: ./server/frontend
      dockerfile: Dockerfile
    container_name: dealership-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - django
    networks:
      - dealership-network

  # Sentiment Analysis Service (Optional)
  sentiment:
    build:
      context: ./server/sentiment
      dockerfile: Dockerfile
    container_name: dealership-sentiment
    restart: unless-stopped
    ports:
      - "5050:5050"
    networks:
      - dealership-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: dealership-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - django
      - frontend
    networks:
      - dealership-network
    profiles:
      - production

networks:
  dealership-network:
    driver: bridge

volumes:
  mongodb_data:
  static_volume:
