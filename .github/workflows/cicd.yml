name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Job 1: Lint Python Files
  lint-python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: Run flake8
        run: |
          flake8 server/djangoapp --max-line-length=120 --ignore=E501,W503
        continue-on-error: true
      
      - name: Check code formatting with black
        run: |
          black --check --diff server/djangoapp
        continue-on-error: true
      
      - name: Check import sorting with isort
        run: |
          isort --check-only --diff server/djangoapp
        continue-on-error: true

  # Job 2: Lint JavaScript Files
  lint-javascript:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install ESLint
        run: npm install -g eslint
      
      - name: Lint React Frontend
        working-directory: server/frontend
        run: |
          npm ci
          npm run lint || true
      
      - name: Lint Express Microservice
        working-directory: server/microservices
        run: |
          npm ci
          npm run lint || true
        continue-on-error: true

  # Job 3: Run Tests
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint-python, lint-javascript]
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Python dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Django migrations
        working-directory: server
        run: |
          python manage.py makemigrations
          python manage.py migrate
      
      - name: Run Django tests
        working-directory: server
        run: |
          python manage.py test djangoapp --verbosity=2
        continue-on-error: true
      
      - name: Install Node.js dependencies (microservice)
        working-directory: server/microservices
        run: npm ci
      
      - name: Run microservice tests
        working-directory: server/microservices
        run: npm test || true
        env:
          MONGODB_URI: mongodb://localhost:27017/test
      
      - name: Install Node.js dependencies (frontend)
        working-directory: server/frontend
        run: npm ci
      
      - name: Run frontend tests
        working-directory: server/frontend
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  # Job 4: Build Docker Images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [run-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: dealership-django:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Microservice image
        uses: docker/build-push-action@v5
        with:
          context: ./server/microservices
          file: ./server/microservices/Dockerfile
          push: false
          tags: dealership-microservice:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./server/frontend
          file: ./server/frontend/Dockerfile
          push: false
          tags: dealership-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 5: Deploy (only on main branch)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy notification
        run: |
          echo "🚀 Deployment would happen here"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
      
      # Add your actual deployment steps here:
      # - Deploy to IBM Cloud
      # - Deploy to Kubernetes
      # - Deploy to Cloud Foundry
      # etc.
